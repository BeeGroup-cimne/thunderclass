<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>ThunderClass — batch classify</title>
  <link rel="stylesheet" href="popup.css" />
  <link rel="stylesheet" href="batch.css" />
</head>
<body>
  <div class="batch-wrap">
    <div class="batch-header">
      <h1>ThunderClass — batch</h1>
      <div id="summary" class="summary">Classifying…</div>
    </div>

    <div id="progress" class="progress hidden">
      <div class="bar"><div id="bar-fill" class="bar-fill"></div></div>
      <div id="progress-text" class="progress-text"></div>
    </div>

    <div class="table-scroll">
      <table id="table" class="batch-table">
        <thead>
          <tr>
            <th class="col-skip" title="Uncheck to skip this row"><input type="checkbox" id="toggleAll" checked /></th>
            <th class="col-subject">Subject</th>
            <th class="col-from">From</th>
            <th class="col-folder">Destination folder</th>
            <th class="col-conf">Conf.</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>

    <div id="error" class="error hidden"></div>

    <div class="batch-actions">
      <a href="#" id="openOptions" class="options-link">Settings</a>
      <div class="spacer"></div>
      <button id="cancel" class="secondary">Cancel</button>
      <button id="moveAll" class="primary" disabled>Move all selected</button>
    </div>
  </div>
  <script type="module" src="batch.js"></script>
</body>
</html>
