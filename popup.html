<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>ThunderClass</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="wrap">
    <h1>ThunderClass</h1>

    <div id="meta" class="meta hidden">
      <div><strong>From:</strong> <span id="from"></span></div>
      <div><strong>Subject:</strong> <span id="subject"></span></div>
    </div>

    <div id="status" class="status">Analyzing…</div>

    <div id="result" class="hidden">
      <label for="folder">Destination folder</label>
      <select id="folder"></select>
      <div class="reason">
        <div><strong>Confidence:</strong> <span id="confidence"></span></div>
        <div><strong>Reason:</strong> <span id="reason"></span></div>
      </div>
      <div class="actions">
        <button id="cancel" class="secondary">Cancel</button>
        <button id="move" class="primary">Move message</button>
      </div>
    </div>

    <div id="error" class="error hidden"></div>
    <div class="footer">
      <a href="#" id="openOptions">Settings</a>
    </div>
  </div>
  <script type="module" src="popup.js"></script>
</body>
</html>
